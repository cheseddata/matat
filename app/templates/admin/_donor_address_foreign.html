        <!-- Foreign Address (USD / Stripe) -->
        <div class="edit-card foreign-card">
            <h3><span class="flag">🌍</span> {% if lang == 'he' %}כתובת חו״ל (דולר / Stripe){% else %}Foreign Address (USD / Stripe){% endif %}</h3>
            <div class="field-row">
                <div class="field-group">
                    <label>{% if lang == 'he' %}טלפון בית{% else %}Home Phone{% endif %}</label>
                    <input type="tel" name="phone" value="{{ donor.phone or '' }}">
                </div>
                <div class="field-group">
                    <label>{% if lang == 'he' %}טלפון נייד{% else %}Cell Phone{% endif %}</label>
                    <input type="tel" name="phone_cell" value="{{ donor.phone_cell or '' }}">
                </div>
            </div>
            <div class="field-row single">
                <div class="field-group">
                    <label>{% if lang == 'he' %}כתובת שורה 1{% else %}Address Line 1{% endif %}</label>
                    <input type="text" name="address_line1" value="{{ donor.address_line1 or '' }}">
                </div>
            </div>
            <div class="field-row single">
                <div class="field-group">
                    <label>{% if lang == 'he' %}כתובת שורה 2{% else %}Address Line 2{% endif %}</label>
                    <input type="text" name="address_line2" value="{{ donor.address_line2 or '' }}">
                </div>
            </div>
            <div class="field-row triple">
                <div class="field-group">
                    <label>{% if lang == 'he' %}עיר{% else %}City{% endif %}</label>
                    <input type="text" name="city" value="{{ donor.city or '' }}">
                </div>
                <div class="field-group">
                    <label>{% if lang == 'he' %}מדינה/מחוז{% else %}State{% endif %}</label>
                    <input type="text" name="state" value="{{ donor.state or '' }}">
                </div>
                <div class="field-group">
                    <label>{% if lang == 'he' %}מיקוד{% else %}Zip{% endif %}</label>
                    <input type="text" name="zip" value="{{ donor.zip or '' }}">
                </div>
            </div>
            <div class="field-row">
                <div class="field-group">
                    <label>{% if lang == 'he' %}מדינה{% else %}Country{% endif %}</label>
                    <select name="country">
                        <option value="US" {{ 'selected' if donor.country == 'US' }}>{% if lang == 'he' %}ארה״ב{% else %}United States{% endif %}</option>
                        <option value="CA" {{ 'selected' if donor.country == 'CA' }}>{% if lang == 'he' %}קנדה{% else %}Canada{% endif %}</option>
                        <option value="GB" {{ 'selected' if donor.country == 'GB' }}>{% if lang == 'he' %}בריטניה{% else %}United Kingdom{% endif %}</option>
                        <option value="AU" {{ 'selected' if donor.country == 'AU' }}>{% if lang == 'he' %}אוסטרליה{% else %}Australia{% endif %}</option>
                        <option value="FR" {{ 'selected' if donor.country == 'FR' }}>{% if lang == 'he' %}צרפת{% else %}France{% endif %}</option>
                        <option value="DE" {{ 'selected' if donor.country == 'DE' }}>{% if lang == 'he' %}גרמניה{% else %}Germany{% endif %}</option>
                        <option value="IL" {{ 'selected' if donor.country == 'IL' }}>{% if lang == 'he' %}ישראל{% else %}Israel{% endif %}</option>
                    </select>
                </div>
            </div>
        </div>
