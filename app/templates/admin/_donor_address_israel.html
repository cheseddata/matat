        <!-- Israeli Address (ILS / Nedarim Plus) -->
        <div class="edit-card il-card">
            <h3><span class="flag">🇮🇱</span> {% if lang == 'he' %}כתובת בישראל (שקלים / נדרים פלוס){% else %}Israeli Address (ILS / Nedarim Plus){% endif %}</h3>
            <div class="field-row">
                <div class="field-group">
                    <label>{% if lang == 'he' %}ת.ז. (תעודת זהות){% else %}Teudat Zehut (ID){% endif %}</label>
                    <input type="text" name="teudat_zehut" value="{{ donor.teudat_zehut or '' }}" maxlength="9" pattern="[0-9]{5,9}" placeholder="{% if lang == 'he' %}מספר ת.ז.{% else %}Israeli ID number{% endif %}">
                </div>
            </div>
            <div class="field-row">
                <div class="field-group">
                    <label>{% if lang == 'he' %}טלפון בית{% else %}Home Phone{% endif %}</label>
                    <input type="tel" name="il_phone" value="{{ donor.il_phone or '' }}" placeholder="02/03/04-xxx-xxxx">
                </div>
                <div class="field-group">
                    <label>{% if lang == 'he' %}טלפון נייד{% else %}Cell Phone{% endif %}</label>
                    <input type="tel" name="il_phone_cell" value="{{ donor.il_phone_cell or '' }}" placeholder="05x-xxx-xxxx">
                </div>
            </div>
            <div class="field-row single">
                <div class="field-group">
                    <label>{% if lang == 'he' %}כתובת{% else %}Address{% endif %}</label>
                    <input type="text" name="il_address_line1" value="{{ donor.il_address_line1 or '' }}" placeholder="{% if lang == 'he' %}רחוב ומספר{% else %}Street and number{% endif %}">
                </div>
            </div>
            <div class="field-row single">
                <div class="field-group">
                    <label>{% if lang == 'he' %}כתובת שורה 2{% else %}Address Line 2{% endif %}</label>
                    <input type="text" name="il_address_line2" value="{{ donor.il_address_line2 or '' }}" placeholder="{% if lang == 'he' %}דירה, כניסה{% else %}Apt, entrance{% endif %}">
                </div>
            </div>
            <div class="field-row">
                <div class="field-group">
                    <label>{% if lang == 'he' %}עיר{% else %}City{% endif %}</label>
                    <input type="text" name="il_city" value="{{ donor.il_city or '' }}">
                </div>
                <div class="field-group">
                    <label>{% if lang == 'he' %}מיקוד{% else %}Zip{% endif %}</label>
                    <input type="text" name="il_zip" value="{{ donor.il_zip or '' }}">
                </div>
            </div>
        </div>
