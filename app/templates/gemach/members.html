{% extends "gemach_base.html" %}
{% block title %}חיפוש — חברים{% endblock %}

{% block extra_css %}
<style>
/* =======================================================
   Haverim search dialog — faithful Access `07_haverim_search` repro.
   Compact W2K popup with 3 search fields + 3-column grid.
   ======================================================= */
.hs-wrap {
    background: #206B65;     /* teal Access form bg behind the dialog */
    min-height: calc(100vh - 130px);
    padding: 30px 12px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
}
.hs-dialog {
    background: #D4D0C8;
    border: 1px solid #0A246A;
    box-shadow: 3px 3px 8px rgba(0,0,0,0.5);
    width: 560px;
    max-width: 100%;
    font-family: 'Segoe UI','David','Arial',sans-serif;
}
.hs-titlebar {
    background: linear-gradient(to bottom, #B9B5AA, #7A7067);
    color: white;
    padding: 3px 8px;
    font: bold 13px 'Segoe UI',sans-serif;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.hs-titlebar .win-btns { display: flex; gap: 2px; }
.hs-titlebar .win-btns a,
.hs-titlebar .win-btns span {
    background:#ECE9D8; color:#000; width:22px; height:18px;
    display:inline-flex; align-items:center; justify-content:center;
    border:1px solid #000; border-top-color:#FFF; border-left-color:#FFF;
    font-size:10px; text-decoration:none; font-weight:bold;
}
.hs-titlebar .win-btns a.x { background:#C62828; color:white; border-color:#8B0000; }

/* Search field row */
.hs-search-row {
    display: grid;
    grid-template-columns: 1fr 1fr 90px;
    gap: 0;
    padding: 4px;
    background: #D4D0C8;
    border-bottom: 1px solid #808080;
}
.hs-search-row input {
    background: white;
    border: 1px inset #888;
    padding: 2px 6px;
    font: 13px 'Segoe UI',sans-serif;
    margin: 0 1px;
    min-width: 0;
}

/* Data grid — tight, single-line rows, Access-style */
.hs-grid-wrap {
    background: #C0C0C0;
    padding: 0;
    max-height: 60vh;
    overflow: auto;
    border: 1px inset #888;
}
.hs-grid {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    font-family: 'Segoe UI','David','Arial',sans-serif;
    background: white;
}
.hs-grid td {
    padding: 2px 8px;
    border-bottom: 1px dotted #B0B0B0;
    white-space: nowrap;
    cursor: pointer;
    background: white;   /* no alternating — Access shows plain white */
}
.hs-grid tr:hover td { background: #FFEE00; }
.hs-grid td.card {
    width: 70px;
    font-family: 'Courier New',monospace;
    color: #0000CC;
    text-align: left;
    direction: ltr;
}
.hs-grid td.first {
    width: 140px;
    text-align: right;
}
.hs-grid td.last {
    text-align: right;
}
.hs-grid tr.selected td { background: #FFEE00; }
.hs-grid .empty td {
    text-align: center; padding: 30px 0; color: #888;
    background: #C0C0C0; cursor: default;
}

/* Blue action-bar at the bottom (matches the binoculars / 9 / 10 icon row) */
.hs-action-bar {
    background: #1A3350;
    padding: 8px 10px;
    display: flex;
    gap: 10px;
    justify-content: center;
    align-items: center;
    border-top: 1px solid #000;
}
.hs-action-btn {
    background: #ECE9D8;
    border: 1px outset #888;
    padding: 4px 12px;
    min-width: 54px;
    height: 42px;
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    color: #000;
    font-size: 10px;
    font-weight: bold;
}
.hs-action-btn i { font-size: 18px; margin-bottom: 2px; color: #000080; }
.hs-action-btn:hover { background: #F5F3E8; }
.hs-action-btn.disabled { opacity: .4; cursor: not-allowed; pointer-events: none; }
.hs-action-btn .num {
    width: 24px; height: 24px; border-radius: 50%;
    color: white; display: flex; align-items: center; justify-content: center;
    font-weight: bold; font-size: 14px; font-family: 'Arial',sans-serif;
}
.hs-action-btn .num.red   { background: #C62828; }
.hs-action-btn .num.green { background: #2E7D32; }

/* Pagination strip — subtle, under the action bar */
.hs-pager {
    background: #D4D0C8; padding: 3px 10px;
    display: flex; justify-content: center; gap: 6px;
    font-size: 11px; align-items: center;
    border-top: 1px solid #808080;
}
.hs-pager a, .hs-pager span.disabled {
    background: #ECE9D8; border: 1px outset #888;
    padding: 1px 8px; text-decoration: none; color: #000; font-size: 11px;
}
.hs-pager span.disabled { opacity: .4; }
</style>
{% endblock %}

{% block content %}
<div class="hs-wrap">
    <div class="hs-dialog">
        <!-- Titlebar -->
        <div class="hs-titlebar">
            <span>חיפוש</span>
            <span class="win-btns">
                <span>_</span>
                <span>□</span>
                <a href="{{ url_for('gemach.switchboard') }}" class="x" title="סגור">✕</a>
            </span>
        </div>

        <!-- 3 search fields (RTL order: card# on the left, first name middle, last name on the right) -->
        <form method="get" id="hsForm" autocomplete="off">
            <div class="hs-search-row">
                <!-- In RTL the rightmost grid cell is first; fill with last_name search -->
                <input type="text" name="last"  value="{{ s_last }}"  placeholder="שם משפחה" autofocus>
                <input type="text" name="first" value="{{ s_first }}" placeholder="שם פרטי"  dir="rtl">
                <input type="text" name="card"  value="{{ s_card }}"  placeholder="מס׳ כרטיס" dir="ltr"
                       style="font-family:'Courier New',monospace; text-align:center;">
            </div>
        </form>

        <!-- Results (grid + action bar + pager). Swapped in-place by JS as the user types. -->
        <div id="hs-results">
            {% include 'gemach/_members_results.html' %}
        </div>
    </div>
</div>

<script>
(function () {
    const form = document.getElementById('hsForm');
    const results = document.getElementById('hs-results');
    const endpoint = "{{ url_for('gemach.members') }}";
    let timer = null;
    let seq = 0;

    function currentParams() {
        const p = new URLSearchParams();
        ['card', 'first', 'last'].forEach(function (n) {
            const v = (form.elements[n].value || '').trim();
            if (v) p.set(n, v);
        });
        return p;
    }

    function refresh() {
        const params = currentParams();
        const qs = params.toString();
        // Reflect current filters in the address bar so refresh / bookmark works.
        history.replaceState(null, '', qs ? ('?' + qs) : location.pathname);

        const mySeq = ++seq;
        params.set('partial', '1');
        fetch(endpoint + '?' + params.toString(), { credentials: 'same-origin' })
            .then(function (r) { return r.text(); })
            .then(function (html) {
                if (mySeq !== seq) return;  // a newer request already fired
                results.innerHTML = html;
            })
            .catch(function () { /* network blip; next keystroke will retry */ });
    }

    function schedule() {
        clearTimeout(timer);
        timer = setTimeout(refresh, 180);
    }

    form.addEventListener('input', schedule);
    form.addEventListener('submit', function (e) { e.preventDefault(); refresh(); });
})();
</script>
{% endblock %}

{% block status %}
חיפוש חברים &middot; {{ '{:,}'.format(members.total) }} רשומות
{% endblock %}
