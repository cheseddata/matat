{% extends "base.html" %}
{% block title %}{{ t('auth.change_password') }} - Matat Mordechai{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 50px auto;">
    <div class="card">
        <h2>{{ t('auth.change_password') }}</h2>
        <p style="margin-bottom: 20px; color: #666;">{{ t('auth.change_password') }}</p>
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="new_password">{{ t('auth.new_password') }}</label>
                <input type="password" id="new_password" name="new_password" required minlength="8">
            </div>
            <div class="form-group">
                <label for="confirm_password">{{ t('auth.confirm_password') }}</label>
                <input type="password" id="confirm_password" name="confirm_password" required minlength="8">
            </div>
            <button type="submit" class="btn">{{ t('auth.update_password') }}</button>
        </form>
    </div>
</div>
{% endblock %}
