<!-- Claude Chat Widget -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
.claude-widget {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 9999;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}

.claude-widget-btn {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    transition: transform 0.2s, box-shadow 0.2s;
}

.claude-widget-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
}

.claude-chat-box {
    display: none;
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 380px;
    height: 500px;
    max-width: calc(100vw - 40px);
    max-height: calc(100vh - 100px);
    background: white;
    border-radius: 16px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    flex-direction: column;
    overflow: hidden;
    z-index: 10000;
}

.claude-chat-box.open {
    display: flex;
}

.claude-chat-box.maximized {
    width: 600px;
    height: 80vh;
    max-width: 90vw;
}

.claude-chat-header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 12px 15px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: move;
    flex-shrink: 0;
}

.claude-chat-avatar {
    width: 40px;
    height: 40px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
}

.claude-chat-info {
    flex: 1;
    color: white;
}

.claude-chat-info .name {
    font-weight: 600;
    font-size: 15px;
}

.claude-chat-info .status {
    font-size: 12px;
    opacity: 0.9;
}

.claude-chat-controls button {
    width: 28px;
    height: 28px;
    border: none;
    background: rgba(255,255,255,0.2);
    border-radius: 6px;
    color: white;
    cursor: pointer;
    font-size: 14px;
    margin-left: 4px;
}

.claude-chat-controls button:hover {
    background: rgba(255,255,255,0.3);
}

/* Chat messages area */
.claude-messages {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
    background: #f8f9fa;
}

.claude-message {
    margin-bottom: 12px;
    display: flex;
    flex-direction: column;
}

.claude-message.user {
    align-items: flex-end;
}

.claude-message.assistant {
    align-items: flex-start;
}

.claude-message-bubble {
    max-width: 85%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.4;
    word-wrap: break-word;
}

.claude-message.user .claude-message-bubble {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border-bottom-right-radius: 4px;
}

.claude-message.assistant .claude-message-bubble {
    background: white;
    color: #333;
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.1);
}

.claude-message-time {
    font-size: 10px;
    color: #999;
    margin-top: 4px;
}

.claude-typing {
    display: flex;
    align-items: center;
    padding: 10px 14px;
    background: white;
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    max-width: 80px;
}

.claude-typing span {
    width: 8px;
    height: 8px;
    background: #999;
    border-radius: 50%;
    margin: 0 2px;
    animation: typing 1s infinite;
}

.claude-typing span:nth-child(2) { animation-delay: 0.2s; }
.claude-typing span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typing {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1); }
}

/* Input area */
.claude-input-area {
    padding: 12px;
    background: white;
    border-top: 1px solid #e0e0e0;
    flex-shrink: 0;
}

.claude-input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
}

.claude-input-wrapper {
    flex: 1;
    position: relative;
}

.claude-input {
    width: 100%;
    padding: 10px 12px;
    border: 2px solid #e0e0e0;
    border-radius: 20px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    max-height: 100px;
    outline: none;
}

.claude-input:focus {
    border-color: #667eea;
}

.claude-send-btn {
    width: 40px;
    height: 40px;
    border: none;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}

.claude-send-btn:hover {
    transform: scale(1.05);
}

.claude-send-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
}

.claude-input-actions {
    display: flex;
    gap: 8px;
    margin-top: 8px;
}

.claude-action-btn {
    padding: 6px 10px;
    border: none;
    background: #e8e8e8;
    border-radius: 15px;
    font-size: 12px;
    cursor: pointer;
    color: #555;
}

.claude-action-btn:hover {
    background: #ddd;
}

/* Welcome message */
.claude-welcome {
    text-align: center;
    padding: 30px 20px;
    color: #666;
}

.claude-welcome h3 {
    margin: 0 0 10px 0;
    color: #333;
}

.claude-welcome p {
    margin: 0;
    font-size: 14px;
}

/* Upload status */
.claude-upload-status {
    font-size: 11px;
    color: #666;
    padding: 0 12px 8px;
    min-height: 16px;
}

@media (max-width: 500px) {
    .claude-chat-box {
        width: calc(100vw - 20px);
        height: calc(100vh - 80px);
        bottom: 10px;
        right: 10px;
    }
}
</style>

<div class="claude-widget" id="claudeWidget">
    <button class="claude-widget-btn" id="claudeWidgetBtn" onclick="toggleClaudeChat()">
        💬
    </button>

    <div class="claude-chat-box" id="claudeChatBox" style="height:600px;">
        <div class="claude-chat-header" id="claudeChatHeader">
            <div class="claude-chat-avatar">🤖</div>
            <div class="claude-chat-info">
                <div class="name">Claude Code</div>
                <div class="status">Developer Terminal</div>
            </div>
            <div class="claude-chat-controls">
                <button onclick="toggleMaximize()" title="Maximize">⬜</button>
                <button onclick="closeClaudeChat()" title="Close">✕</button>
            </div>
        </div>

        <!-- Terminal (ttyd) -->
        <div style="flex:1; background:#1a1a2e; overflow:hidden;">
            <iframe id="claudeFrame" src="/help" style="width:100%;height:100%;border:none;"></iframe>
        </div>

        <!-- Screenshot / Upload bar -->
        <div class="claude-input-actions" style="padding:6px 12px; background:#f5f5f5; border-top:1px solid #e0e0e0;">
            <button class="claude-action-btn" onclick="takeScreenshot()">📸 Screenshot</button>
            <button class="claude-action-btn" onclick="document.getElementById('claudeFileInput').click()">📁 Upload</button>
            <input type="file" id="claudeFileInput" accept="image/*" style="display:none" onchange="uploadFileWidget(this)">
        </div>
        <div class="claude-upload-status" id="claudeUploadStatus"></div>
    </div>
</div>

<script>
const chatBox = document.getElementById('claudeChatBox');
const btn = document.getElementById('claudeWidgetBtn');

window.toggleClaudeChat = function() {
    if (chatBox.classList.contains('open')) {
        chatBox.classList.remove('open');
        btn.style.display = 'flex';
    } else {
        chatBox.classList.add('open');
        btn.style.display = 'none';
    }
};

window.closeClaudeChat = function() {
    chatBox.classList.remove('open');
    chatBox.classList.remove('maximized');
    btn.style.display = 'flex';
};

window.toggleMaximize = function() {
    chatBox.classList.toggle('maximized');
};

// Dragging
let isDragging = false, dragX, dragY;
document.getElementById('claudeChatHeader').addEventListener('mousedown', function(e) {
    if (e.target.tagName === 'BUTTON') return;
    isDragging = true;
    const rect = chatBox.getBoundingClientRect();
    dragX = e.clientX - rect.left;
    dragY = e.clientY - rect.top;
});
document.addEventListener('mousemove', function(e) {
    if (!isDragging) return;
    chatBox.style.left = (e.clientX - dragX) + 'px';
    chatBox.style.top = (e.clientY - dragY) + 'px';
    chatBox.style.right = 'auto';
    chatBox.style.bottom = 'auto';
});
document.addEventListener('mouseup', function() { isDragging = false; });

// Screenshot: capture current page, upload, show URL
async function takeScreenshot() {
    const status = document.getElementById('claudeUploadStatus');
    status.textContent = 'Capturing...';
    chatBox.style.display = 'none';

    try {
        const canvas = await html2canvas(document.body, { useCORS: true });
        chatBox.style.display = 'flex';
        chatBox.classList.add('open');

        const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
        const form = new FormData();
        form.append('file', blob, 'screenshot.png');
        form.append('description', 'Page: ' + location.href);

        status.textContent = 'Uploading...';
        const res = await fetch('/claude/screenshot/upload', { method: 'POST', body: form });
        const data = await res.json();

        if (data.success) {
            const fullUrl = window.location.origin + data.url;
            status.innerHTML = '✓ <a href="' + data.url + '" target="_blank" style="color:#3498db">' + data.filename + '</a> <span style="cursor:pointer;color:#27ae60" onclick="navigator.clipboard.writeText(\'' + fullUrl + '\');this.textContent=\'Copied!\'">[Copy URL]</span>';
        } else {
            status.textContent = 'Error: ' + (data.error || 'Upload failed');
        }
    } catch (err) {
        chatBox.style.display = 'flex';
        chatBox.classList.add('open');
        status.textContent = 'Error: ' + err.message;
    }
}

// Upload file
function uploadFileWidget(input) {
    if (!input.files.length) return;
    const status = document.getElementById('claudeUploadStatus');
    status.textContent = 'Uploading...';

    const form = new FormData();
    form.append('file', input.files[0]);
    fetch('/claude/screenshot/upload', { method: 'POST', body: form })
        .then(r => r.json())
        .then(d => {
            if (d.success) {
                const fullUrl = window.location.origin + d.url;
                status.innerHTML = '✓ <a href="' + d.url + '" target="_blank" style="color:#3498db">' + d.filename + '</a> <span style="cursor:pointer;color:#27ae60" onclick="navigator.clipboard.writeText(\'' + fullUrl + '\');this.textContent=\'Copied!\'">[Copy URL]</span>';
            } else {
                status.textContent = 'Error';
            }
        });
    input.value = '';
}

// Ctrl+V paste screenshot from clipboard (works on any screen)
document.addEventListener('paste', async function(e) {
    const items = e.clipboardData && e.clipboardData.items;
    if (!items) return;

    for (let i = 0; i < items.length; i++) {
        if (items[i].type.indexOf('image') !== -1) {
            e.preventDefault();
            const file = items[i].getAsFile();
            const status = document.getElementById('claudeUploadStatus');

            // Open widget if not open
            if (!chatBox.classList.contains('open')) {
                chatBox.classList.add('open');
                btn.style.display = 'none';
            }

            status.textContent = 'Uploading pasted image...';

            const form = new FormData();
            form.append('file', file, 'pasted-image.png');
            form.append('description', 'Pasted from: ' + location.href);

            try {
                const res = await fetch('/claude/screenshot/upload', { method: 'POST', body: form });
                const data = await res.json();

                if (data.success) {
                    const fullUrl = window.location.origin + data.url;
                    status.innerHTML = '✓ <a href="' + data.url + '" target="_blank" style="color:#3498db">' + data.filename + '</a> <span style="cursor:pointer;color:#27ae60" onclick="navigator.clipboard.writeText(\'' + fullUrl + '\');this.textContent=\'Copied!\'">[Copy URL]</span>';
                } else {
                    status.textContent = 'Error: ' + (data.error || 'Upload failed');
                }
            } catch (err) {
                status.textContent = 'Error: ' + err.message;
            }
            break;
        }
    }
});
</script>
