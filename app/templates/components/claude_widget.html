<!-- Claude Chat Widget -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
.claude-widget {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 9999;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}

.claude-widget-btn {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    transition: transform 0.2s, box-shadow 0.2s;
}

.claude-widget-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
}

.claude-chat-box {
    display: none;
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 380px;
    height: 500px;
    max-width: calc(100vw - 40px);
    max-height: calc(100vh - 100px);
    background: white;
    border-radius: 16px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    flex-direction: column;
    overflow: hidden;
    z-index: 10000;
}

.claude-chat-box.open {
    display: flex;
}

.claude-chat-box.maximized {
    width: 600px;
    height: 80vh;
    max-width: 90vw;
}

.claude-chat-header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 12px 15px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: move;
    flex-shrink: 0;
}

.claude-chat-avatar {
    width: 40px;
    height: 40px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
}

.claude-chat-info {
    flex: 1;
    color: white;
}

.claude-chat-info .name {
    font-weight: 600;
    font-size: 15px;
}

.claude-chat-info .status {
    font-size: 12px;
    opacity: 0.9;
}

.claude-chat-controls button {
    width: 28px;
    height: 28px;
    border: none;
    background: rgba(255,255,255,0.2);
    border-radius: 6px;
    color: white;
    cursor: pointer;
    font-size: 14px;
    margin-left: 4px;
}

.claude-chat-controls button:hover {
    background: rgba(255,255,255,0.3);
}

/* Chat messages area */
.claude-messages {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
    background: #f8f9fa;
}

.claude-message {
    margin-bottom: 12px;
    display: flex;
    flex-direction: column;
}

.claude-message.user {
    align-items: flex-end;
}

.claude-message.assistant {
    align-items: flex-start;
}

.claude-message-bubble {
    max-width: 85%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.4;
    word-wrap: break-word;
}

.claude-message.user .claude-message-bubble {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border-bottom-right-radius: 4px;
}

.claude-message.assistant .claude-message-bubble {
    background: white;
    color: #333;
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.1);
}

.claude-message-time {
    font-size: 10px;
    color: #999;
    margin-top: 4px;
}

.claude-typing {
    display: flex;
    align-items: center;
    padding: 10px 14px;
    background: white;
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    max-width: 80px;
}

.claude-typing span {
    width: 8px;
    height: 8px;
    background: #999;
    border-radius: 50%;
    margin: 0 2px;
    animation: typing 1s infinite;
}

.claude-typing span:nth-child(2) { animation-delay: 0.2s; }
.claude-typing span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typing {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1); }
}

/* Input area */
.claude-input-area {
    padding: 12px;
    background: white;
    border-top: 1px solid #e0e0e0;
    flex-shrink: 0;
}

.claude-input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
}

.claude-input-wrapper {
    flex: 1;
    position: relative;
}

.claude-input {
    width: 100%;
    padding: 10px 12px;
    border: 2px solid #e0e0e0;
    border-radius: 20px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    max-height: 100px;
    outline: none;
}

.claude-input:focus {
    border-color: #667eea;
}

.claude-send-btn {
    width: 40px;
    height: 40px;
    border: none;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}

.claude-send-btn:hover {
    transform: scale(1.05);
}

.claude-send-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
}

.claude-input-actions {
    display: flex;
    gap: 8px;
    margin-top: 8px;
}

.claude-action-btn {
    padding: 6px 10px;
    border: none;
    background: #e8e8e8;
    border-radius: 15px;
    font-size: 12px;
    cursor: pointer;
    color: #555;
}

.claude-action-btn:hover {
    background: #ddd;
}

/* Welcome message */
.claude-welcome {
    text-align: center;
    padding: 30px 20px;
    color: #666;
}

.claude-welcome h3 {
    margin: 0 0 10px 0;
    color: #333;
}

.claude-welcome p {
    margin: 0;
    font-size: 14px;
}

/* Developer terminal mode */
.claude-chat-box.developer-mode {
    height: 600px;
}

.claude-chat-body {
    flex: 1;
    background: #1a1a2e;
}

.claude-chat-body iframe {
    width: 100%;
    height: 100%;
    border: none;
}

.claude-chat-footer {
    padding: 8px 12px;
    background: #f5f5f5;
    border-top: 1px solid #e0e0e0;
    display: flex;
    gap: 8px;
    align-items: center;
}

.claude-screenshot-btn {
    padding: 5px 10px;
    background: #3498db;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 11px;
}

.claude-upload-status {
    flex: 1;
    font-size: 11px;
    color: #666;
}

@media (max-width: 500px) {
    .claude-chat-box {
        width: calc(100vw - 20px);
        height: calc(100vh - 80px);
        bottom: 10px;
        right: 10px;
    }
}
</style>

<div class="claude-widget" id="claudeWidget">
    <button class="claude-widget-btn" id="claudeWidgetBtn" onclick="toggleClaudeChat()">
        💬
    </button>

    <div class="claude-chat-box {% if current_user.username == 'admin' %}developer-mode{% endif %}" id="claudeChatBox">
        <div class="claude-chat-header" id="claudeChatHeader">
            <div class="claude-chat-avatar">🤖</div>
            <div class="claude-chat-info">
                <div class="name">Claude Assistant</div>
                <div class="status">{% if current_user.username == 'admin' %}Developer Mode{% else %}Here to help!{% endif %}</div>
            </div>
            <div class="claude-chat-controls">
                <button onclick="toggleMaximize()" title="Maximize">⬜</button>
                <button onclick="closeClaudeChat()" title="Close">✕</button>
            </div>
        </div>

        {% if current_user.username == 'admin' %}
        <!-- Developer: Terminal -->
        <div class="claude-chat-body">
            <iframe id="claudeFrame" src="/help" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
        </div>
        <div class="claude-chat-footer">
            <button class="claude-screenshot-btn" onclick="captureScreen()">🐛 Report</button>
            <button class="claude-screenshot-btn" onclick="document.getElementById('claudeFileInput').click()" style="background:#9b59b6">📁 Upload</button>
            <input type="file" id="claudeFileInput" accept="image/*" style="display:none" onchange="uploadFile(this)">
            <div class="claude-upload-status" id="claudeUploadStatus"></div>
        </div>
        {% else %}
        <!-- Users: Live Chat -->
        <div class="claude-messages" id="claudeMessages">
            <div class="claude-welcome">
                <h3>Hi {{ current_user.first_name or current_user.username }}! 👋</h3>
                <p>How can I help you today?<br>Just type your question below.</p>
            </div>
        </div>
        <div class="claude-input-area">
            <div class="claude-input-row">
                <div class="claude-input-wrapper">
                    <textarea class="claude-input" id="claudeInput" placeholder="Type your message..." rows="1" onkeydown="handleInputKey(event)"></textarea>
                </div>
                <button class="claude-send-btn" id="claudeSendBtn" onclick="sendMessage()">➤</button>
            </div>
            <div class="claude-input-actions">
                <button class="claude-action-btn" onclick="captureAndAsk()">📸 Screenshot</button>
                <button class="claude-action-btn" onclick="clearChat()">🗑️ Clear</button>
            </div>
        </div>
        {% endif %}
    </div>
</div>

<script>
const isDeveloper = {{ 'true' if current_user.username == 'admin' else 'false' }};
const chatBox = document.getElementById('claudeChatBox');
const btn = document.getElementById('claudeWidgetBtn');

window.toggleClaudeChat = function() {
    if (chatBox.classList.contains('open')) {
        chatBox.classList.remove('open');
        btn.style.display = 'flex';
    } else {
        chatBox.classList.add('open');
        btn.style.display = 'none';
        if (!isDeveloper) {
            loadChatHistory();
            document.getElementById('claudeInput')?.focus();
        } else {
            const frame = document.getElementById('claudeFrame');
            if (frame && (!frame.src || frame.src === 'about:blank')) {
                frame.src = '/help';
            }
        }
    }
};

window.closeClaudeChat = function() {
    chatBox.classList.remove('open');
    chatBox.classList.remove('maximized');
    btn.style.display = 'flex';
};

window.toggleMaximize = function() {
    chatBox.classList.toggle('maximized');
};

// Dragging
let isDragging = false, dragX, dragY;
document.getElementById('claudeChatHeader').addEventListener('mousedown', function(e) {
    if (e.target.tagName === 'BUTTON') return;
    isDragging = true;
    const rect = chatBox.getBoundingClientRect();
    dragX = e.clientX - rect.left;
    dragY = e.clientY - rect.top;
});
document.addEventListener('mousemove', function(e) {
    if (!isDragging) return;
    chatBox.style.left = (e.clientX - dragX) + 'px';
    chatBox.style.top = (e.clientY - dragY) + 'px';
    chatBox.style.right = 'auto';
    chatBox.style.bottom = 'auto';
});
document.addEventListener('mouseup', function() { isDragging = false; });

{% if current_user.username != 'admin' %}
// Chat functions
async function loadChatHistory() {
    try {
        const res = await fetch('/claude/chat/history');
        const data = await res.json();
        const container = document.getElementById('claudeMessages');

        if (data.messages && data.messages.length > 0) {
            container.innerHTML = '';
            data.messages.forEach(msg => addMessage(msg.role, msg.content, false));
            scrollToBottom();
        }
    } catch (err) {
        console.error('Failed to load chat history:', err);
    }
}

function addMessage(role, content, animate = true) {
    const container = document.getElementById('claudeMessages');

    // Remove welcome message if present
    const welcome = container.querySelector('.claude-welcome');
    if (welcome) welcome.remove();

    const div = document.createElement('div');
    div.className = 'claude-message ' + role;
    div.innerHTML = `
        <div class="claude-message-bubble">${escapeHtml(content)}</div>
        <div class="claude-message-time">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
    `;

    if (animate) {
        div.style.opacity = '0';
        div.style.transform = 'translateY(10px)';
    }

    container.appendChild(div);

    if (animate) {
        setTimeout(() => {
            div.style.transition = 'all 0.2s';
            div.style.opacity = '1';
            div.style.transform = 'translateY(0)';
        }, 10);
    }

    scrollToBottom();
}

function showTyping() {
    const container = document.getElementById('claudeMessages');
    const div = document.createElement('div');
    div.className = 'claude-message assistant';
    div.id = 'typingIndicator';
    div.innerHTML = '<div class="claude-typing"><span></span><span></span><span></span></div>';
    container.appendChild(div);
    scrollToBottom();
}

function hideTyping() {
    document.getElementById('typingIndicator')?.remove();
}

function scrollToBottom() {
    const container = document.getElementById('claudeMessages');
    container.scrollTop = container.scrollHeight;
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML.replace(/\n/g, '<br>');
}

function handleInputKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
}

async function sendMessage() {
    const input = document.getElementById('claudeInput');
    const sendBtn = document.getElementById('claudeSendBtn');
    const message = input.value.trim();

    if (!message) return;

    // Add user message
    addMessage('user', message);
    input.value = '';
    input.style.height = 'auto';

    // Disable input while waiting
    sendBtn.disabled = true;
    showTyping();

    try {
        const formData = new FormData();
        formData.append('message', message);
        formData.append('page_url', window.location.href);

        const res = await fetch('/claude/chat/send', { method: 'POST', body: formData });
        const data = await res.json();

        hideTyping();

        if (data.success) {
            addMessage('assistant', data.response);
        } else {
            addMessage('assistant', 'Sorry, something went wrong: ' + (data.error || 'Unknown error'));
        }
    } catch (err) {
        hideTyping();
        addMessage('assistant', 'Sorry, I could not connect. Please try again.');
    }

    sendBtn.disabled = false;
    input.focus();
}

async function clearChat() {
    if (!confirm('Clear chat history?')) return;

    try {
        await fetch('/claude/chat/clear', { method: 'POST' });
        const container = document.getElementById('claudeMessages');
        container.innerHTML = `
            <div class="claude-welcome">
                <h3>Chat cleared! 👋</h3>
                <p>How can I help you?</p>
            </div>
        `;
    } catch (err) {
        alert('Failed to clear chat');
    }
}

async function captureAndAsk() {
    const input = document.getElementById('claudeInput');
    chatBox.style.display = 'none';

    try {
        const canvas = await html2canvas(document.body, { useCORS: true });
        chatBox.style.display = 'flex';
        chatBox.classList.add('open');

        // Upload screenshot
        const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
        const form = new FormData();
        form.append('file', blob, 'screenshot.png');

        const res = await fetch('/claude/screenshot/upload', { method: 'POST', body: form });
        const data = await res.json();

        if (data.success) {
            input.value = '[Screenshot attached]\n';
            input.focus();
            input.setSelectionRange(input.value.length, input.value.length);
        }
    } catch (err) {
        chatBox.style.display = 'flex';
        chatBox.classList.add('open');
        alert('Screenshot failed: ' + err.message);
    }
}
{% endif %}

// Developer functions
{% if current_user.username == 'admin' %}
async function captureScreen() {
    const issue = prompt('What is the issue?');
    if (!issue) return;

    const status = document.getElementById('claudeUploadStatus');
    chatBox.style.display = 'none';

    try {
        const canvas = await html2canvas(document.body, { useCORS: true });
        chatBox.style.display = 'flex';
        chatBox.classList.add('open');

        canvas.toBlob(async blob => {
            const form = new FormData();
            form.append('file', blob, 'screenshot.png');
            form.append('description', 'Page: ' + location.href + '\n\nIssue: ' + issue);

            const res = await fetch('/claude/screenshot/upload', { method: 'POST', body: form });
            const data = await res.json();
            status.textContent = data.success ? '✓ Uploaded' : 'Error';
        }, 'image/png');
    } catch (err) {
        chatBox.style.display = 'flex';
        status.textContent = 'Error: ' + err.message;
    }
}

function uploadFile(input) {
    if (!input.files.length) return;
    const form = new FormData();
    form.append('file', input.files[0]);
    fetch('/claude/screenshot/upload', { method: 'POST', body: form })
        .then(r => r.json())
        .then(d => {
            const status = document.getElementById('claudeUploadStatus');
            if (d.success) {
                const fullUrl = window.location.origin + d.url;
                status.innerHTML = '<a href="' + d.url + '" target="_blank">' + fullUrl + '</a>';
                status.onclick = () => {
                    navigator.clipboard.writeText(fullUrl);
                    status.textContent = 'Copied!';
                    setTimeout(() => { status.innerHTML = '<a href="' + d.url + '" target="_blank">' + fullUrl + '</a>'; }, 1500);
                };
            } else {
                status.textContent = 'Error';
            }
        });
    input.value = '';
}

// Paste screenshot handling (Ctrl+V)
document.addEventListener('paste', async function(e) {
    if (!chatBox.classList.contains('open')) return;

    const items = e.clipboardData.items;
    for (let item of items) {
        if (item.type.indexOf('image') !== -1) {
            e.preventDefault();
            const file = item.getAsFile();
            const status = document.getElementById('claudeUploadStatus');
            status.textContent = 'Uploading...';

            const form = new FormData();
            form.append('file', file, 'pasted-image.png');

            try {
                const res = await fetch('/claude/screenshot/upload', { method: 'POST', body: form });
                const data = await res.json();

                if (data.success) {
                    const fullUrl = window.location.origin + data.url;
                    status.innerHTML = '<a href="' + data.url + '" target="_blank">' + fullUrl + '</a> (click to copy)';
                    status.onclick = () => {
                        navigator.clipboard.writeText(fullUrl);
                        status.textContent = 'Copied!';
                        setTimeout(() => { status.innerHTML = '<a href="' + data.url + '" target="_blank">' + fullUrl + '</a>'; }, 1500);
                    };
                } else {
                    status.textContent = 'Error: ' + (data.error || 'Upload failed');
                }
            } catch (err) {
                status.textContent = 'Error: ' + err.message;
            }
            break;
        }
    }
});
{% endif %}
</script>
