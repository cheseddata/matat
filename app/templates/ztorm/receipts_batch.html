{% extends "ztorm_base.html" %}
{% block title %}ZTorm - {{ t('ztorm.receipts_batch.page_title') }}{% endblock %}
{% block content %}
<div class="access-window">
    <div class="access-title-bar"><span><i class="fas fa-receipt"></i> {{ t('ztorm.receipts_batch.title_bar') }}</span></div>
    <div style="padding: 20px;">
        <p>{{ t('ztorm.receipts_batch.description') }}</p>
        <form method="post" action="{{ url_for('ztorm.receipts_batch') }}">
            <button type="submit" class="btn btn-primary" onclick="return confirm('{{ t('ztorm.receipts_batch.confirm') }}')">
                <i class="fas fa-play"></i> {{ t('ztorm.receipts_batch.btn_start') }}
            </button>
            <a href="{{ url_for('ztorm.receipts') }}" class="btn btn-secondary">{{ t('ztorm.common.btn_back') }}</a>
        </form>
    </div>
</div>
{% endblock %}
